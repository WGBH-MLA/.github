name: 🐍 Pytest

on:
  workflow_call:
    inputs:
      python_version:
        description: The version of python to setup
        type: string
        default: 3.x

      environment:
        description: The name of the environment to deploy
        type: string
        default: Codecov

      uv_args:
        description: Install args for uv
        type: string
        default: --no-dev

      pytest_args:
        description: Additional args to pass to pytest
        type: string

jobs:
  run_pytest:
    name: 🐍 Run pytest and upload coverage report
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: 📰 Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 😎 Install uv
      uses: astral-sh/setup-uv@v7
    
    - name: 🔃 Sync dependencies
      run: uv sync ${{ inputs.uv_args }}

    - name: 🧪 Run tests
      run: uv run pytest -v --cov --cov-report lcov ${{ inputs.pytest_args }}

    - name: 📈 Uploade coverage report
      # run this step, even if the tests fail
      if: success() || failure()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
